server.port=8080
spring.application.name=BwVrBackend

# PostgreSQL DB (Railway)
spring.datasource.url=jdbc:postgresql://postgres.railway.internal:5432/railway
spring.datasource.username=postgres
spring.datasource.password=tSvYmCYSmXdGZbqeaaDiUmXmAkMWqkbC
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# File storage
bwvr.upload.dir=/app/uploads
bwvr.template.dir=/app/templates
bwvr.report.output.dir=/app/reports

# CORS
bwvr.cors.allowed-origins=http://localhost:8084,https://provaluer-production.up.railway.app

# File size limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=1MB

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always