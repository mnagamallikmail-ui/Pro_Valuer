name: bwvr_frontend
description: BwVr Report Management System - Flutter Web Frontend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Navigation
  go_router: ^14.2.0

  # State Management
  provider: ^6.1.0
  flutter_riverpod: ^2.5.1

  # File Operations
  file_picker: ^8.0.0
  image_picker: ^1.1.0
  http: ^1.2.0

  # Internationalization & Date Formatting
  intl: ^0.19.0

  # UI Components
  table_calendar: ^3.1.0
  shimmer: ^3.0.0
  dotted_border: 2.1.0
  badges: ^3.1.2
  data_table_2: ^2.5.0
  flutter_animate: ^4.5.0

  # Typography
  google_fonts: ^6.1.0

  # URL launching
  url_launcher: ^6.2.0

  # Charts
  fl_chart: 0.66.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo.png
