spring.profiles.active=railway
server.address=0.0.0.0
server.port=${PORT:8080}
spring.application.name=BwVrBackend

# ✅ Railway PostgreSQL - uses SPRING_DATASOURCE_* env vars set in Railway
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.schemas=bwvr
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA:bwvr}
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

bwvr.jwt.secret=${JWT_SECRET:BwVrSuperSecretKeyForJWTAuthReplaceThisInProdBwVrSuperSecretKeyForJWTAuth}
bwvr.jwt.expiration-ms=86400000

bwvr.upload.dir=/app/uploads
bwvr.template.dir=/app/templates
bwvr.report.output.dir=/app/reports

bwvr.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://bwvrfrontend-production.up.railway.app,http://localhost,http://localhost:8080,http://localhost:3000}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=1MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
