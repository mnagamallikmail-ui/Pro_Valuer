server.port=8080
spring.application.name=BwVrBackend

# Oracle DB (Cloud-Native Configuration)
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/FREEPDB1}
spring.datasource.username=${DB_USERNAME:BWVR}
spring.datasource.password=${DB_PASSWORD:bwvr_pass}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# File storage
bwvr.upload.dir=C:/bwvr/uploads
bwvr.template.dir=C:/bwvr/templates
bwvr.report.output.dir=C:/bwvr/reports

# CORS
bwvr.cors.allowed-origins=http://localhost:8084

# File size limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=1MB

# Oracle BLOB handling
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
