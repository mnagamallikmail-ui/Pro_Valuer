spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

bwvr.upload.dir=${java.io.tmpdir}/bwvr-test/uploads
bwvr.template.dir=${java.io.tmpdir}/bwvr-test/templates
bwvr.report.output.dir=${java.io.tmpdir}/bwvr-test/reports

bwvr.cors.allowed-origins=http://localhost:8084

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
