spring.profiles.active=railway
server.address=0.0.0.0
server.port=${PORT:8080}
spring.application.name=BwVrBackend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bwvr}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

bwvr.jwt.secret=${JWT_SECRET:BwVrSuperSecretKeyForJWTAuthReplaceThisInProdBwVrSuperSecretKeyForJWTAuth}
bwvr.jwt.expiration-ms=86400000

bwvr.upload.dir=/app/uploads
bwvr.template.dir=/app/templates
bwvr.report.output.dir=/app/reports

bwvr.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8084}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=1MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always