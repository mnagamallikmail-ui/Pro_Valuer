name: Deploy to VPS

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: pro_valuer-backend
  IMAGE_NAME_FRONTEND: pro_valuer-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Backend Build ---
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build Backend with Gradle
        run: |
          cd BwVrBackend
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./BwVrBackend
          file: ./BwVrBackend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_BACKEND }}:latest

      # --- Frontend Build ---
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Build Frontend for Web
        run: |
          cd BwVrFrontend
          flutter pub get
          flutter build web --release --pwa-strategy=none \
            --dart-define=API_BASE_URL=https://provaluer.in/api/v1/

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./BwVrFrontend
          file: ./BwVrFrontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_FRONTEND }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/provaluer-vr/app
            # Create/Update .env file from secrets
            echo "DB_NAME=${{ secrets.DB_NAME }}" > .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=\"${{ secrets.DB_PASSWORD }}\"" >> .env
            echo "JWT_SECRET=\"${{ secrets.JWT_SECRET }}\"" >> .env
            echo "CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}" >> .env
            echo "GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}" >> .env
            
            # Pull and Restart
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
