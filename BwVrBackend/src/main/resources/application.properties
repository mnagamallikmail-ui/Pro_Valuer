# ─── Core Application ──────────────────────────────────────────────────────────
# Profile set to 'prod' - neutral, not Railway-specific
spring.profiles.active=prod
server.address=0.0.0.0
server.port=${PORT:8080}
spring.application.name=BwVrBackend

# ─── Database (PostgreSQL) ─────────────────────────────────────────────────────
# Supply these via environment variables on your VPS / Docker Compose / Kubernetes
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://DB_HOST:5432/DB_NAME}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:DB_USER}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── Flyway Configuration ──────────────────────────────────────────────────────
# Do NOT set spring.flyway.schemas here.
# Setting flyway.schemas causes Flyway to expect the schema to already exist
# before it can place its history table — creating a chicken-and-egg problem
# on a fresh deployment. Instead, our V1 migration creates the schema.
# Flyway will place flyway_schema_history in the default (public) schema,
# which always exists, and then V1 creates bwvr + all objects.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate: Hibernate checks that entity mappings match DB schema, but does NOT
# create or alter tables. Flyway owns the schema; Hibernate only reads it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA:bwvr}
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ─── JWT ───────────────────────────────────────────────────────────────────────
# REPLACE JWT_SECRET with a strong random secret in production!
bwvr.jwt.secret=${JWT_SECRET:REPLACE_WITH_STRONG_SECRET_BEFORE_DEPLOYING}
bwvr.jwt.expiration-ms=86400000

# ─── Storage Paths (env-driven, fallback to /app/* for Docker) ─────────────────
bwvr.upload.dir=${BWVR_UPLOAD_DIR:/app/uploads}
bwvr.template.dir=${BWVR_TEMPLATE_DIR:/app/templates}
bwvr.report.output.dir=${BWVR_REPORT_OUTPUT_DIR:/app/reports}

# ─── CORS ──────────────────────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGINS to your actual frontend VPS domain or IP.
# Do NOT leave as localhost in production.
bwvr.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:3000}

# ─── File Upload Limits ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=1MB

# ─── API Documentation (Swagger/OpenAPI) ───────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Actuator / Health ─────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
